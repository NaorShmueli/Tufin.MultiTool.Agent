services:
  api:
    container_name: tufin-multi-agent-api

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__AgentDatabase: >
        Data Source=/app/data/agent-observability.db

      CatalogDatabase__ConnectionString: >
        Data Source=/app/data/catalog.db

      Agent__MaxSteps: "8"
      Agent__MaxToolCallsPerStep: "4"
      Agent__Temperature: "0"

      OpenMeteo__GeocodingBaseUrl: >
        https://geocoding-api.open-meteo.com

      OpenMeteo__ForecastBaseUrl: >
        https://api.open-meteo.com

      OpenMeteo__TimeoutSeconds: "10"

      Ollama__BaseUrl: http://ollama:11434
      Ollama__Model: llama3.2:3b

    volumes:
      - agent-data:/app/data

    depends_on:
      ollama-pull:
        condition: service_completed_successfully

    restart: unless-stopped

  ollama:
    container_name: tufin-multi-agent-ollama

    image: ollama/ollama:latest

    ports:
      - "11434:11434"

    volumes:
      - ollama-data:/root/.ollama

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 20

    restart: unless-stopped

  ollama-pull:
    container_name: tufin-multi-agent-ollama-pull

    image: ollama/ollama:latest

    environment:
      OLLAMA_HOST: http://ollama:11434

    command: pull llama3.2:3b

    depends_on:
      ollama:
        condition: service_healthy

    restart: "no"

volumes:
  agent-data:
  ollama-data:
